# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/medconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# SERVER
# ===============================
server.port=8081

# ===============================
# JWT (use env var or strong secret in production; min 32 chars for HS256)
# ===============================
app.jwt.secret=${JWT_SECRET:medconnect-dev-secret-key-change-in-prod-32b}
app.jwt.expiration-ms=86400000

# Set true only in dev to create ADMIN user (see AdminBootstrap). Disable in production.
app.bootstrap-admin=false

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.medconnect.backend=INFO
