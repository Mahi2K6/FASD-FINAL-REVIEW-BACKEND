# ===============================
# DATABASE (env-overridable for Railway)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/medconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.application.name=backend
app.name=MedConnect
app.logo=/assets/logo.png
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# SERVER
# ===============================
server.port=${PORT:8081}
server.address=0.0.0.0

# ===============================
# JWT (use env var or strong secret in production; min 32 chars for HS256)
# ===============================
jwt.secret=${JWT_SECRET:medconnect-dev-secret-key}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}
socketio.port=${SOCKETIO_PORT:9092}

# Enable admin bootstrap on startup (disable in hardened production environments).
app.bootstrap-admin=${BOOTSTRAP_ADMIN:true}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.medconnect.backend=INFO
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:DEBUG}

# ===============================
# AI AGENT (Gemini)
# ===============================
app.ai.gemini-api-key=${GEMINI_API_KEY:AIzaSyA_3uZnpA-g7s9BKdA-lpxmUHvTw0LxeVg}
app.ai.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}

# ===============================
# ERROR DEBUGGING
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=${STACKTRACE:always}

# ===============================
# MULTIPART UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB


