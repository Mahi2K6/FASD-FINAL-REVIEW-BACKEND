# ===============================
# DATABASE (Railway Environment Variables)
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:medconnect}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.application.name=backend
app.name=MedConnect
app.logo=/assets/logo.png
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# SERVER
# ===============================
# Bind to Railway's dynamic PORT, fallback to 8080
server.port=${PORT:8080}
server.address=0.0.0.0

# ===============================
# JWT
# ===============================
app.jwt.secret=${JWT_SECRET:medconnect-dev-secret-key-that-is-at-least-32-bytes-long}
app.jwt.expirationMs=${JWT_EXPIRATION:86400000}


# Enable admin bootstrap on startup (disable in hardened production environments).
app.bootstrap-admin=${BOOTSTRAP_ADMIN:true}

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.medconnect.backend=INFO
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:DEBUG}

# ===============================
# AI AGENT (Gemini)
# ===============================
app.ai.gemini-api-key=${GEMINI_API_KEY:AIzaSyA_3uZnpA-g7s9BKdA-lpxmUHvTw0LxeVg}
app.ai.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}

# ===============================
# ERROR DEBUGGING
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=${STACKTRACE:always}

# ===============================
# MULTIPART UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
