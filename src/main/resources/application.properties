# ===============================
# DATABASE (Railway Environment Variables)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://root:ByKpogemwbtjGdISgySrYwFwPJQyDMFK@shortline.proxy.rlwy.net:47226/railway}
spring.datasource.username=${DB_USER:root}
